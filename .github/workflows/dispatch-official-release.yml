name: Dispatch Official Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: dispatch-official-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch release workflow
    if: github.repository == 'ShaoZhang0115/InternAgents' && github.event.deleted == false
    runs-on: ubuntu-latest

    steps:
      - name: Require official workflow token
        env:
          INTERNAGENTS_OFFICIAL_RELEASE_TOKEN: ${{ secrets.INTERNAGENTS_OFFICIAL_RELEASE_TOKEN || secrets.INTERNAGENTS_RELEASE_TOKEN }}
        run: |
          if [ -z "$INTERNAGENTS_OFFICIAL_RELEASE_TOKEN" ]; then
            echo "::error::Set INTERNAGENTS_OFFICIAL_RELEASE_TOKEN or INTERNAGENTS_RELEASE_TOKEN in ${GITHUB_REPOSITORY} with Actions write access to InternScience/InternAgents."
            exit 1
          fi

      - name: Dispatch official release
        env:
          GH_TOKEN: ${{ secrets.INTERNAGENTS_OFFICIAL_RELEASE_TOKEN || secrets.INTERNAGENTS_RELEASE_TOKEN }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_REF: ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if ! [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like vX.Y.Z, got: $RELEASE_TAG"
            exit 1
          fi

          gh workflow run release.yml \
            --repo InternScience/InternAgents \
            --ref guidedtour \
            -f source_repository="$SOURCE_REPOSITORY" \
            -f source_ref="$SOURCE_REF" \
            -f release_tag="$RELEASE_TAG" \
            -f release_notes="Triggered from ${SOURCE_REPOSITORY}@${SOURCE_REF}"
