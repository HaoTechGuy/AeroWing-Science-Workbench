name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  # Public release-only repository. The source repository only triggers CI.
  INTERNAGENTS_RELEASE_REPO: shuyuehu/InternAgents

jobs:
  release:
    runs-on: macos-14

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Require cross-repository release token
        env:
          INTERNAGENTS_RELEASE_TOKEN: ${{ secrets.INTERNAGENTS_RELEASE_TOKEN }}
        run: |
          if [ -z "$INTERNAGENTS_RELEASE_TOKEN" ]; then
            echo "::error::Set INTERNAGENTS_RELEASE_TOKEN in qzzqzzb/InternAgents -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ui/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Set desktop release version
        run: |
          node <<'NODE'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME || "";
          const match = tag.match(/^v(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$/);
          if (!match) {
            throw new Error(`Release tag must look like vX.Y.Z, got: ${tag}`);
          }
          const version = match[1];
          const packagePath = "desktop/package.json";
          const lockPath = "desktop/package-lock.json";
          const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          pkg.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);

          if (fs.existsSync(lockPath)) {
            const lock = JSON.parse(fs.readFileSync(lockPath, "utf8"));
            lock.version = version;
            if (lock.packages && lock.packages[""]) {
              lock.packages[""].version = version;
            }
            fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, 2)}\n`);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `INTERNAGENTS_DESKTOP_VERSION=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `INTERNAGENTS_RELEASE_TAG=${tag}\n`);
          NODE

      - name: Prepare bundled Python runtime
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install .

      - name: Validate Python files
        run: |
          .venv/bin/python <<'PY'
          import compileall
          import pathlib
          import sys
          import tomllib

          config = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          modules = config["tool"]["setuptools"].get("py-modules", [])
          files = [pathlib.Path(module.replace(".", "/") + ".py") for module in modules]
          missing = [str(path) for path in files if not path.exists()]
          if missing:
            print(f"Missing Python modules from pyproject.toml: {', '.join(missing)}", file=sys.stderr)
            sys.exit(1)
          failed = [str(path) for path in files if not compileall.compile_file(str(path), quiet=1)]
          if failed:
            print(f"Python compile failed: {', '.join(failed)}", file=sys.stderr)
            sys.exit(1)
          PY

      - name: Validate UI
        run: |
          npm --prefix ui run lint
          npm --prefix ui run build

      - name: Build macOS DMG
        run: npm --prefix desktop run build

      - name: Publish binary release
        env:
          GH_TOKEN: ${{ secrets.INTERNAGENTS_RELEASE_TOKEN }}
        run: |
          NOTES="InternAgents macOS App release ${INTERNAGENTS_RELEASE_TAG}

          Source tag: ${GITHUB_REF_NAME}
          Source commit: ${GITHUB_SHA}"

          shopt -s nullglob
          dmg_assets=(desktop/release/InternAgents-*.dmg)
          optional_assets=(desktop/release/*.blockmap desktop/release/latest-mac.yml)
          assets=("${dmg_assets[@]}" "${optional_assets[@]}")

          if [ "${#dmg_assets[@]}" -eq 0 ]; then
            echo "::error::No DMG assets found under desktop/release."
            exit 1
          fi

          if gh release view "$INTERNAGENTS_RELEASE_TAG" --repo "$INTERNAGENTS_RELEASE_REPO" >/dev/null 2>&1; then
            gh release upload "$INTERNAGENTS_RELEASE_TAG" \
              "${assets[@]}" \
              --repo "$INTERNAGENTS_RELEASE_REPO" \
              --clobber
            gh release edit "$INTERNAGENTS_RELEASE_TAG" \
              --repo "$INTERNAGENTS_RELEASE_REPO" \
              --title "$INTERNAGENTS_RELEASE_TAG" \
              --notes "$NOTES" \
              --latest
          else
            gh release create "$INTERNAGENTS_RELEASE_TAG" \
              "${assets[@]}" \
              --repo "$INTERNAGENTS_RELEASE_REPO" \
              --title "$INTERNAGENTS_RELEASE_TAG" \
              --notes "$NOTES" \
              --latest
          fi
