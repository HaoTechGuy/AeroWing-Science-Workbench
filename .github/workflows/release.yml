name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  # Public release-only repository. The source repository only triggers CI.
  INTERNAGENTS_RELEASE_REPO: shuyuehu/InternAgents
  INTERNAGENTS_RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ui/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Set desktop release version
        run: |
          node <<'NODE'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME || "";
          const match = tag.match(/^v(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$/);
          if (!match) {
            throw new Error(`Release tag must look like vX.Y.Z, got: ${tag}`);
          }
          const version = match[1];
          const packagePath = "desktop/package.json";
          const lockPath = "desktop/package-lock.json";
          const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          pkg.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);

          if (fs.existsSync(lockPath)) {
            const lock = JSON.parse(fs.readFileSync(lockPath, "utf8"));
            lock.version = version;
            if (lock.packages && lock.packages[""]) {
              lock.packages[""].version = version;
            }
            fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, 2)}\n`);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `INTERNAGENTS_DESKTOP_VERSION=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `INTERNAGENTS_RELEASE_TAG=${tag}\n`);
          NODE

      - name: Prepare bundled Python runtime
        run: |
          python -m pip install --upgrade pip uv
          rm -rf .desktop-python-runtime
          export UV_PYTHON_INSTALL_DIR="$PWD/.desktop-python-runtime/python"
          uv python install 3.11 --managed-python --no-bin
          uv venv "$PWD/.desktop-python-runtime/venv" \
            --python 3.11 \
            --managed-python \
            --seed \
            --relocatable
          uv pip install \
            --python "$PWD/.desktop-python-runtime/venv/bin/python" \
            --link-mode copy \
            --compile-bytecode \
            .
          "$PWD/.desktop-python-runtime/venv/bin/python" -c "import langgraph_cli; print(langgraph_cli.__file__)"
          echo "INTERNAGENTS_PYTHON_RUNTIME_SOURCE=$PWD/.desktop-python-runtime" >> "$GITHUB_ENV"

      - name: Validate Python files
        run: |
          .desktop-python-runtime/venv/bin/python -m compileall \
            agent.py \
            internagent_resources.py \
            ssh_backend.py \
            kb_sync_middleware.py \
            goal_middleware.py \
            goal_state.py \
            goal_tools.py \
            mineru_middleware.py

      - name: Validate UI
        run: |
          npm --prefix ui run lint
          npm --prefix ui run build

      - name: Build macOS DMG
        env:
          INTERNAGENTS_DESKTOP_ARCH: ${{ matrix.arch }}
        run: npm --prefix desktop run build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: internagents-dmg-${{ matrix.arch }}
          path: desktop/release/InternAgents-*-${{ matrix.arch }}.dmg
          if-no-files-found: error


  build-windows:
    name: Build Windows installer (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ui/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Set desktop release version
        shell: pwsh
        run: |
          $script = @'
          const fs = require("fs");
          const tag = process.env.GITHUB_REF_NAME || "";
          const match = tag.match(/^v(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$/);
          if (!match) {
            throw new Error(`Release tag must look like vX.Y.Z, got: ${tag}`);
          }
          const version = match[1];
          const packagePath = "desktop/package.json";
          const lockPath = "desktop/package-lock.json";
          const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          pkg.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);

          if (fs.existsSync(lockPath)) {
            const lock = JSON.parse(fs.readFileSync(lockPath, "utf8"));
            lock.version = version;
            if (lock.packages && lock.packages[""]) {
              lock.packages[""].version = version;
            }
            fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, 2)}\n`);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `INTERNAGENTS_DESKTOP_VERSION=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `INTERNAGENTS_RELEASE_TAG=${tag}\n`);
          '@
          $script | node

      - name: Prepare bundled Python runtime
        shell: pwsh
        run: |
          python -m pip install --upgrade pip uv
          $runtime = Join-Path $PWD.Path ".desktop-python-runtime"
          Remove-Item -Recurse -Force $runtime -ErrorAction SilentlyContinue
          $env:UV_PYTHON_INSTALL_DIR = Join-Path $runtime "python"
          uv python install 3.11 --managed-python --no-bin
          uv venv (Join-Path $runtime "venv") --python 3.11 --managed-python --seed --relocatable
          $python = Join-Path $runtime "venv\Scripts\python.exe"
          uv pip install --python $python --link-mode copy --compile-bytecode .
          & $python -c "import langgraph_cli; print(langgraph_cli.__file__)"
          "INTERNAGENTS_PYTHON_RUNTIME_SOURCE=$runtime" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Validate Python files
        shell: pwsh
        run: |
          & .desktop-python-runtime\venv\Scripts\python.exe -m compileall `
            agent.py `
            internagent_resources.py `
            ssh_backend.py `
            kb_sync_middleware.py `
            goal_middleware.py `
            goal_state.py `
            goal_tools.py `
            mineru_middleware.py

      - name: Validate UI
        run: |
          npm --prefix ui run lint
          npm --prefix ui run build

      - name: Build Windows artifacts
        run: npm --prefix desktop run build:win:all

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: internagents-windows-x64
          path: |
            desktop/release/InternAgents-*-x64.exe
            desktop/release/InternAgents-*-x64.zip
          if-no-files-found: error

  release:
    name: Publish binary release
    needs:
      - build
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Require cross-repository release token
        env:
          INTERNAGENTS_RELEASE_TOKEN: ${{ secrets.INTERNAGENTS_RELEASE_TOKEN }}
        run: |
          if [ -z "$INTERNAGENTS_RELEASE_TOKEN" ]; then
            echo "::error::Set INTERNAGENTS_RELEASE_TOKEN in qzzqzzb/InternAgents -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: internagents-*
          path: release-assets
          merge-multiple: true

      - name: Publish binary release
        env:
          GH_TOKEN: ${{ secrets.INTERNAGENTS_RELEASE_TOKEN }}
        run: |
          shopt -s nullglob
          dmg_assets=(release-assets/InternAgents-*.dmg)
          windows_assets=(release-assets/InternAgents-*.exe release-assets/InternAgents-*.zip)
          if [ "${#dmg_assets[@]}" -ne 2 ]; then
            printf 'Expected exactly two DMGs, found %s:\n' "${#dmg_assets[@]}"
            printf '  %s\n' "${dmg_assets[@]}"
            exit 1
          fi
          if [ "${#windows_assets[@]}" -ne 2 ]; then
            printf 'Expected exactly two Windows assets, found %s:\n' "${#windows_assets[@]}"
            printf '  %s\n' "${windows_assets[@]}"
            exit 1
          fi
          release_assets=("${dmg_assets[@]}" "${windows_assets[@]}")

          NOTES="InternAgents desktop app release ${INTERNAGENTS_RELEASE_TAG}

          Release highlights:
          - macOS desktop app packaged for Apple Silicon and Intel Macs.
          - Windows desktop app packaged as an x64 NSIS installer plus ZIP.
          - Auto-update assets are published separately by platform and architecture.

          Source tag: ${GITHUB_REF_NAME}
          Assets: arm64 Apple Silicon DMG, x64 Intel DMG, Windows x64 EXE, and Windows x64 ZIP"

          if gh release view "$INTERNAGENTS_RELEASE_TAG" --repo "$INTERNAGENTS_RELEASE_REPO" >/dev/null 2>&1; then
            existing_assets="$(gh release view "$INTERNAGENTS_RELEASE_TAG" --repo "$INTERNAGENTS_RELEASE_REPO" --json assets --jq '.assets[].name')"
            while IFS= read -r asset; do
              [ -z "$asset" ] && continue
              gh release delete-asset "$INTERNAGENTS_RELEASE_TAG" "$asset" --repo "$INTERNAGENTS_RELEASE_REPO" --yes
            done <<< "$existing_assets"

            gh release upload "$INTERNAGENTS_RELEASE_TAG" \
              "${release_assets[@]}" \
              --repo "$INTERNAGENTS_RELEASE_REPO" \
              --clobber
            gh release edit "$INTERNAGENTS_RELEASE_TAG" \
              --repo "$INTERNAGENTS_RELEASE_REPO" \
              --title "$INTERNAGENTS_RELEASE_TAG" \
              --notes "$NOTES" \
              --latest
          else
            gh release create "$INTERNAGENTS_RELEASE_TAG" \
              "${release_assets[@]}" \
              --repo "$INTERNAGENTS_RELEASE_REPO" \
              --title "$INTERNAGENTS_RELEASE_TAG" \
              --notes "$NOTES" \
              --latest
          fi
