name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0 or v0.1.0-test.1"
        required: true
        default: "v0.1.0"
      prerelease:
        description: "Mark this release as a prerelease"
        type: boolean
        required: false
        default: true
      release_notes:
        description: "Optional extra release notes"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      desktop_version: ${{ steps.release.outputs.desktop_version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      source_ref: ${{ steps.release.outputs.source_ref }}
      source_label: ${{ steps.release.outputs.source_label }}
      extra_notes: ${{ steps.release.outputs.extra_notes }}

    steps:
      - name: Compute release metadata
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          EXTRA_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG:-v0.1.0}"
            if ! [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?)$ ]]; then
              echo "::error::tag must look like vX.Y.Z or vX.Y.Z-suffix, got: $tag"
              exit 1
            fi
            desktop_version="${BASH_REMATCH[1]}"
            release_tag="$tag"
            is_prerelease="${INPUT_PRERELEASE:-true}"
            source_ref="${GITHUB_REF_NAME}"
            source_label="${GITHUB_REPOSITORY}@${GITHUB_REF_NAME} (${GITHUB_SHA})"
          else
            tag="${GITHUB_REF_NAME}"
            if ! [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?)$ ]]; then
              echo "::error::Release tag must look like vX.Y.Z, got: $tag"
              exit 1
            fi
            desktop_version="${BASH_REMATCH[1]}"
            release_tag="$tag"
            source_ref="$tag"
            source_label="${GITHUB_REPOSITORY}@${tag}"
            if [[ "$desktop_version" == *-* || "$desktop_version" == *+* ]]; then
              is_prerelease="true"
            else
              is_prerelease="false"
            fi
          fi

          {
            echo "desktop_version=$desktop_version"
            echo "is_prerelease=$is_prerelease"
            echo "release_tag=$release_tag"
            echo "source_ref=$source_ref"
            echo "source_label=$source_label"
            echo "extra_notes<<EOF"
            printf '%s\n' "${EXTRA_NOTES:-}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          printf 'Release repository: %s\n' "$GITHUB_REPOSITORY"
          printf 'Release tag: %s\n' "$release_tag"
          printf 'Desktop version: %s\n' "$desktop_version"
          printf 'Source ref: %s\n' "$source_ref"

  prepare-release:
    name: Prepare GitHub release
    needs: metadata
    runs-on: ubuntu-latest
    env:
      INTERNAGENTS_DESKTOP_VERSION: ${{ needs.metadata.outputs.desktop_version }}
      INTERNAGENTS_IS_PRERELEASE: ${{ needs.metadata.outputs.is_prerelease }}
      INTERNAGENTS_RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
      INTERNAGENTS_SOURCE_LABEL: ${{ needs.metadata.outputs.source_label }}
      INTERNAGENTS_EXTRA_NOTES: ${{ needs.metadata.outputs.extra_notes }}

    steps:
      - name: Create or refresh release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          InternAgents ${INTERNAGENTS_RELEASE_TAG}

          Assets:
          - macOS Apple Silicon DMG
          - Remote backend CLI tarball for SSH runtime setup

          Desktop version: ${INTERNAGENTS_DESKTOP_VERSION}
          Source ref: ${INTERNAGENTS_SOURCE_LABEL}
          EOF

          if [ -n "${INTERNAGENTS_EXTRA_NOTES:-}" ]; then
            {
              printf '\nAdditional notes:\n'
              printf '%s\n' "${INTERNAGENTS_EXTRA_NOTES}"
            } >> "$notes_file"
          fi

          if [ "$INTERNAGENTS_IS_PRERELEASE" = "true" ]; then
            release_flags=(--prerelease)
          else
            release_flags=(--latest)
          fi

          target_flags=()
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            target_flags=(--target "$GITHUB_SHA")
          fi

          if gh release view "$INTERNAGENTS_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            existing_assets="$(gh release view "$INTERNAGENTS_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
            while IFS= read -r asset; do
              [ -z "$asset" ] && continue
              gh release delete-asset "$INTERNAGENTS_RELEASE_TAG" "$asset" --repo "$GITHUB_REPOSITORY" --yes
            done <<< "$existing_assets"

            gh release edit "$INTERNAGENTS_RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$INTERNAGENTS_RELEASE_TAG" \
              --notes-file "$notes_file" \
              "${release_flags[@]}"
          else
            gh release create "$INTERNAGENTS_RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$INTERNAGENTS_RELEASE_TAG" \
              --notes-file "$notes_file" \
              "${release_flags[@]}" \
              "${target_flags[@]}"
          fi

  build-macos:
    name: Build macOS DMG
    needs:
      - metadata
      - prepare-release
    runs-on: macos-14
    env:
      INTERNAGENTS_DESKTOP_ARCH: arm64
      INTERNAGENTS_DESKTOP_VERSION: ${{ needs.metadata.outputs.desktop_version }}
      INTERNAGENTS_RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.source_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ui/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Set desktop release version
        run: |
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.INTERNAGENTS_DESKTOP_VERSION || "";
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Desktop version must look like X.Y.Z, got: ${version}`);
          }
          for (const file of ["desktop/package.json", "desktop/package-lock.json"]) {
            const data = JSON.parse(fs.readFileSync(file, "utf8"));
            data.version = version;
            if (data.packages && data.packages[""]) {
              data.packages[""].version = version;
            }
            fs.writeFileSync(file, `${JSON.stringify(data, null, 2)}\n`);
          }
          NODE

      - name: Prepare bundled Python runtime
        run: |
          python -m pip install --upgrade pip uv
          rm -rf .desktop-python-runtime
          export UV_PYTHON_INSTALL_DIR="$PWD/.desktop-python-runtime/python"
          uv python install 3.11 --managed-python --no-bin
          uv venv "$PWD/.desktop-python-runtime/venv" \
            --python 3.11 \
            --managed-python \
            --seed \
            --relocatable
          uv pip install \
            --python "$PWD/.desktop-python-runtime/venv/bin/python" \
            --link-mode copy \
            --compile-bytecode \
            .
          uv pip install \
            --python "$PWD/.desktop-python-runtime/venv/bin/python" \
            --link-mode copy \
            --compile-bytecode \
            "markitdown[pptx]" pandas openpyxl lxml defusedxml
          "$PWD/.desktop-python-runtime/venv/bin/python" -c "import langgraph_cli; print(langgraph_cli.__file__)"
          echo "INTERNAGENTS_PYTHON_RUNTIME_SOURCE=$PWD/.desktop-python-runtime" >> "$GITHUB_ENV"

      - name: Validate Python sources
        run: |
          python_files=(
            agent.py
            date_middleware.py
            dynamic_local_backend.py
            goal_middleware.py
            goal_state.py
            goal_tools.py
            internagent_resources.py
            internagents_backend_cli.py
            kb_sync_middleware.py
            main.py
            mcp_config.py
            mcp_tools.py
            remote_compute_tools.py
            ssh_backend.py
            thread_skill_middleware.py
            web_search_tools.py
          )
          .desktop-python-runtime/venv/bin/python -m compileall "${python_files[@]}"
          .desktop-python-runtime/venv/bin/python -c "import agent; print(agent.MODEL)"

      - name: Validate UI
        run: |
          npm --prefix ui run lint
          npm --prefix ui run build

      - name: Build macOS DMG
        env:
          INTERNAGENTS_PYTHON_RUNTIME_SOURCE: ${{ github.workspace }}/.desktop-python-runtime
        run: npm --prefix desktop run build

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          dmg="$(find desktop/release -maxdepth 1 -name "InternAgents-*-${INTERNAGENTS_DESKTOP_ARCH}.dmg" -print -quit)"
          if [ -z "$dmg" ]; then
            echo "::error::No macOS DMG was produced."
            find desktop/release -maxdepth 1 -type f -print || true
            exit 1
          fi
          gh release upload "$INTERNAGENTS_RELEASE_TAG" "$dmg" --repo "$GITHUB_REPOSITORY" --clobber

  build-remote-backend:
    name: Build remote backend
    needs:
      - metadata
      - prepare-release
    runs-on: ubuntu-latest
    env:
      INTERNAGENTS_RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.source_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Prepare backend dependency environment
        run: |
          python -m venv .remote-package-venv
          .remote-package-venv/bin/python -m pip install --upgrade pip
          .remote-package-venv/bin/python -m pip install .

      - name: Build remote backend package
        env:
          INTERNAGENTS_PYTHON_BIN: ${{ github.workspace }}/.remote-package-venv/bin/python
        run: npm --prefix desktop run prepare:remote

      - name: Upload remote backend package to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="dist-remote/internagents-backend-cli.tar.gz"
          if [ ! -f "$asset" ]; then
            echo "::error::Remote backend package was not produced at $asset."
            find dist-remote -maxdepth 2 -type f -print || true
            exit 1
          fi
          gh release upload "$INTERNAGENTS_RELEASE_TAG" "$asset" --repo "$GITHUB_REPOSITORY" --clobber
