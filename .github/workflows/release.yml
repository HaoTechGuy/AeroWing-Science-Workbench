name: Release

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Test release {0} {1} #{2}', github.ref_name, inputs.base_version, github.run_number) || format('Release {0}', github.ref_name) }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      base_version:
        description: "Base desktop version for test releases, for example 0.1.5"
        required: true
        default: "0.1.5"
      release_notes:
        description: "Optional extra notes for the test release"
        required: false
        default: ""

permissions:
  contents: read

env:
  # Public release-only repository. The source repository only triggers CI.
  INTERNAGENTS_OFFICIAL_RELEASE_REPO: InternScience/InternAgents

jobs:
  metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      desktop_version: ${{ steps.release.outputs.desktop_version }}
      is_test_release: ${{ steps.release.outputs.is_test_release }}
      release_repo: ${{ steps.release.outputs.release_repo }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      source_label: ${{ steps.release.outputs.source_label }}
      extra_notes: ${{ steps.release.outputs.extra_notes }}

    steps:
      - name: Compute release metadata
        id: release
        env:
          BASE_VERSION: ${{ inputs.base_version }}
          EXTRA_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            base_version="${BASE_VERSION:-0.1.5}"
            if ! [[ "$base_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::base_version must look like X.Y.Z, got: $base_version"
              exit 1
            fi

            safe_branch="$(printf '%s' "$GITHUB_REF_NAME" \
              | tr '[:upper:]' '[:lower:]' \
              | sed -E 's/[^0-9a-z]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')"
            if [ -z "$safe_branch" ]; then
              safe_branch="branch"
            fi

            timestamp="$(date -u +'%Y%m%d.%H%M%S')"
            desktop_version="${base_version}-test.${safe_branch}.${timestamp}"
            release_tag="v${desktop_version}"
            release_repo="${GITHUB_REPOSITORY}"
            is_test_release="true"
            source_label="${GITHUB_REF_NAME}@${GITHUB_SHA}"
          else
            tag="${GITHUB_REF_NAME}"
            if ! [[ "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?)$ ]]; then
              echo "::error::Release tag must look like vX.Y.Z, got: $tag"
              exit 1
            fi

            desktop_version="${BASH_REMATCH[1]}"
            release_tag="$tag"
            release_repo="${INTERNAGENTS_OFFICIAL_RELEASE_REPO}"
            is_test_release="false"
            source_label="$tag"
          fi

          {
            echo "desktop_version=$desktop_version"
            echo "is_test_release=$is_test_release"
            echo "release_repo=$release_repo"
            echo "release_tag=$release_tag"
            echo "source_label=$source_label"
            {
              echo "extra_notes<<EOF"
              printf '%s\n' "${EXTRA_NOTES:-}"
              echo "EOF"
            }
          } >> "$GITHUB_OUTPUT"

          printf 'Release repo: %s\n' "$release_repo"
          printf 'Release tag: %s\n' "$release_tag"
          printf 'Desktop version: %s\n' "$desktop_version"

  build:
    name: Build macOS DMG (${{ matrix.arch }})
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-15-intel

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ui/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Set desktop release version
        env:
          INTERNAGENTS_DESKTOP_VERSION: ${{ needs.metadata.outputs.desktop_version }}
          INTERNAGENTS_RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.INTERNAGENTS_DESKTOP_VERSION || "";
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Desktop version must look like X.Y.Z, got: ${version}`);
          }
          const packagePath = "desktop/package.json";
          const lockPath = "desktop/package-lock.json";
          const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          pkg.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);

          if (fs.existsSync(lockPath)) {
            const lock = JSON.parse(fs.readFileSync(lockPath, "utf8"));
            lock.version = version;
            if (lock.packages && lock.packages[""]) {
              lock.packages[""].version = version;
            }
            fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, 2)}\n`);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `INTERNAGENTS_DESKTOP_VERSION=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `INTERNAGENTS_RELEASE_TAG=${process.env.INTERNAGENTS_RELEASE_TAG}\n`);
          NODE

      - name: Prepare bundled Python runtime
        run: |
          python -m pip install --upgrade pip uv
          rm -rf .desktop-python-runtime
          export UV_PYTHON_INSTALL_DIR="$PWD/.desktop-python-runtime/python"
          uv python install 3.11 --managed-python --no-bin
          uv venv "$PWD/.desktop-python-runtime/venv" \
            --python 3.11 \
            --managed-python \
            --seed \
            --relocatable
          uv pip install \
            --python "$PWD/.desktop-python-runtime/venv/bin/python" \
            --link-mode copy \
            --compile-bytecode \
            .
          "$PWD/.desktop-python-runtime/venv/bin/python" -c "import langgraph_cli; print(langgraph_cli.__file__)"
          echo "INTERNAGENTS_PYTHON_RUNTIME_SOURCE=$PWD/.desktop-python-runtime" >> "$GITHUB_ENV"

      - name: Validate Python files
        run: |
          .desktop-python-runtime/venv/bin/python -m compileall \
            agent.py \
            internagent_resources.py \
            ssh_backend.py \
            kb_sync_middleware.py \
            goal_middleware.py \
            goal_state.py \
            goal_tools.py \
            mineru_middleware.py

      - name: Validate UI
        run: |
          npm --prefix ui run lint
          npm --prefix ui run build

      - name: Build macOS DMG
        env:
          INTERNAGENTS_DESKTOP_ARCH: ${{ matrix.arch }}
        run: npm --prefix desktop run build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: internagents-dmg-${{ matrix.arch }}
          path: desktop/release/InternAgents-*-${{ matrix.arch }}.dmg
          if-no-files-found: error

      - name: Upload backend CLI artifact
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v6
        with:
          name: internagents-backend-cli
          path: dist-app/internagents-template/internagents-backend-cli.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build Windows installer (x64)
    needs: metadata
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            ui/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install UI dependencies
        run: npm --prefix ui ci

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Set desktop release version
        shell: pwsh
        env:
          INTERNAGENTS_DESKTOP_VERSION: ${{ needs.metadata.outputs.desktop_version }}
          INTERNAGENTS_RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
        run: |
          $script = @'
          const fs = require("fs");
          const version = process.env.INTERNAGENTS_DESKTOP_VERSION || "";
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Desktop version must look like X.Y.Z, got: ${version}`);
          }
          const packagePath = "desktop/package.json";
          const lockPath = "desktop/package-lock.json";
          const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
          pkg.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);

          if (fs.existsSync(lockPath)) {
            const lock = JSON.parse(fs.readFileSync(lockPath, "utf8"));
            lock.version = version;
            if (lock.packages && lock.packages[""]) {
              lock.packages[""].version = version;
            }
            fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, 2)}\n`);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `INTERNAGENTS_DESKTOP_VERSION=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_ENV, `INTERNAGENTS_RELEASE_TAG=${process.env.INTERNAGENTS_RELEASE_TAG}\n`);
          '@
          $script | node

      - name: Prepare bundled Python runtime
        shell: pwsh
        run: |
          python -m pip install --upgrade pip uv
          $runtime = Join-Path $PWD.Path ".desktop-python-runtime"
          Remove-Item -Recurse -Force $runtime -ErrorAction SilentlyContinue
          $env:UV_PYTHON_INSTALL_DIR = Join-Path $runtime "python"
          uv python install 3.11 --managed-python --no-bin
          uv venv (Join-Path $runtime "venv") --python 3.11 --managed-python --seed --relocatable
          $python = Join-Path $runtime "venv\Scripts\python.exe"
          uv pip install --python $python --link-mode copy --compile-bytecode .
          & $python -c "import langgraph_cli; print(langgraph_cli.__file__)"
          "INTERNAGENTS_PYTHON_RUNTIME_SOURCE=$runtime" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Validate Python files
        shell: pwsh
        run: |
          & .desktop-python-runtime\venv\Scripts\python.exe -m compileall `
            agent.py `
            internagent_resources.py `
            ssh_backend.py `
            kb_sync_middleware.py `
            goal_middleware.py `
            goal_state.py `
            goal_tools.py `
            mineru_middleware.py

      - name: Validate UI
        run: |
          npm --prefix ui run lint
          npm --prefix ui run build

      - name: Build Windows artifacts
        run: npm --prefix desktop run build:win:all

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: internagents-windows-x64
          path: |
            desktop/release/InternAgents-*-x64.exe
            desktop/release/InternAgents-*-x64.zip
          if-no-files-found: error

  release:
    name: Publish binary release
    needs:
      - metadata
      - build
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      INTERNAGENTS_DESKTOP_VERSION: ${{ needs.metadata.outputs.desktop_version }}
      INTERNAGENTS_IS_TEST_RELEASE: ${{ needs.metadata.outputs.is_test_release }}
      INTERNAGENTS_RELEASE_REPO: ${{ needs.metadata.outputs.release_repo }}
      INTERNAGENTS_RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
      INTERNAGENTS_SOURCE_LABEL: ${{ needs.metadata.outputs.source_label }}
      INTERNAGENTS_EXTRA_NOTES: ${{ needs.metadata.outputs.extra_notes }}

    steps:
      - name: Require cross-repository release token
        if: needs.metadata.outputs.is_test_release != 'true'
        env:
          INTERNAGENTS_RELEASE_TOKEN: ${{ secrets.INTERNAGENTS_RELEASE_TOKEN }}
        run: |
          if [ -z "$INTERNAGENTS_RELEASE_TOKEN" ]; then
            echo "::error::Set INTERNAGENTS_RELEASE_TOKEN in the source repository -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Download desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: internagents-*
          path: release-assets
          merge-multiple: true

      - name: Publish binary release
        env:
          GH_TOKEN: ${{ needs.metadata.outputs.is_test_release == 'true' && github.token || secrets.INTERNAGENTS_RELEASE_TOKEN }}
        run: |
          shopt -s nullglob
          dmg_assets=(release-assets/InternAgents-*.dmg)
          windows_assets=(release-assets/InternAgents-*.exe release-assets/InternAgents-*.zip)
          backend_assets=(release-assets/internagents-backend-cli.tar.gz)
          if [ "${#dmg_assets[@]}" -ne 2 ]; then
            printf 'Expected exactly two DMGs, found %s:\n' "${#dmg_assets[@]}"
            printf '  %s\n' "${dmg_assets[@]}"
            exit 1
          fi
          if [ "${#windows_assets[@]}" -ne 2 ]; then
            printf 'Expected exactly two Windows assets, found %s:\n' "${#windows_assets[@]}"
            printf '  %s\n' "${windows_assets[@]}"
            exit 1
          fi
          if [ "${#backend_assets[@]}" -ne 1 ]; then
            printf 'Expected exactly one backend CLI asset, found %s:\n' "${#backend_assets[@]}"
            printf '  %s\n' "${backend_assets[@]}"
            exit 1
          fi
          release_assets=("${dmg_assets[@]}" "${windows_assets[@]}" "${backend_assets[@]}")

          if [ "$INTERNAGENTS_IS_TEST_RELEASE" = "true" ]; then
            release_kind="test release"
            latest_args=(--prerelease)
            target_args=(--target "$GITHUB_SHA")
            encoded_tag="${INTERNAGENTS_RELEASE_TAG//\//%2F}"
            test_update_notes="
          Test update API:
          INTERNAGENTS_UPDATE_API_URL=https://api.github.com/repos/${INTERNAGENTS_RELEASE_REPO}/releases/tags/${encoded_tag}"
          else
            release_kind="release"
            latest_args=(--latest)
            target_args=()
            test_update_notes=""
          fi

          NOTES="InternAgents desktop app ${release_kind} ${INTERNAGENTS_RELEASE_TAG}

          Release highlights:
          - macOS desktop app packaged for Apple Silicon and Intel Macs.
          - Windows desktop app packaged as an x64 NSIS installer plus ZIP.
          - Remote backend CLI package for SSH workspace runtime synchronization.
          - Auto-update assets are published separately by platform and architecture.

          Desktop version: ${INTERNAGENTS_DESKTOP_VERSION}
          Source ref: ${INTERNAGENTS_SOURCE_LABEL}
          Assets: arm64 Apple Silicon DMG, x64 Intel DMG, Windows x64 EXE, Windows x64 ZIP, and remote backend CLI tarball${test_update_notes}"

          if [ -n "${INTERNAGENTS_EXTRA_NOTES:-}" ]; then
            NOTES="${NOTES}

          Additional notes:
          ${INTERNAGENTS_EXTRA_NOTES}"
          fi

          if gh release view "$INTERNAGENTS_RELEASE_TAG" --repo "$INTERNAGENTS_RELEASE_REPO" >/dev/null 2>&1; then
            existing_assets="$(gh release view "$INTERNAGENTS_RELEASE_TAG" --repo "$INTERNAGENTS_RELEASE_REPO" --json assets --jq '.assets[].name')"
            while IFS= read -r asset; do
              [ -z "$asset" ] && continue
              gh release delete-asset "$INTERNAGENTS_RELEASE_TAG" "$asset" --repo "$INTERNAGENTS_RELEASE_REPO" --yes
            done <<< "$existing_assets"

            gh release upload "$INTERNAGENTS_RELEASE_TAG" \
              "${release_assets[@]}" \
              --repo "$INTERNAGENTS_RELEASE_REPO" \
              --clobber
            gh release edit "$INTERNAGENTS_RELEASE_TAG" \
              --repo "$INTERNAGENTS_RELEASE_REPO" \
              --title "$INTERNAGENTS_RELEASE_TAG" \
              --notes "$NOTES" \
              "${latest_args[@]}"
          else
            gh release create "$INTERNAGENTS_RELEASE_TAG" \
              "${release_assets[@]}" \
              --repo "$INTERNAGENTS_RELEASE_REPO" \
              --title "$INTERNAGENTS_RELEASE_TAG" \
              --notes "$NOTES" \
              "${latest_args[@]}" \
              "${target_args[@]}"
          fi
