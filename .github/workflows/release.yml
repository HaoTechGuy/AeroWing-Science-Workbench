name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python files
        run: |
          python -m compileall agent.py internagent_resources.py ssh_backend.py kb_sync_middleware.py

      - name: Validate UI
        run: |
          npm --prefix ui ci
          npm --prefix ui run lint
          npm --prefix ui run build

      - name: Package source release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          git archive \
            --format=tar.gz \
            --prefix="internagents-${VERSION}/" \
            --output="dist/internagents-v${VERSION}.tar.gz" \
            HEAD
          sha256sum "dist/internagents-v${VERSION}.tar.gz" > "dist/internagents-v${VERSION}.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
