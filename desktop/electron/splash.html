<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InternAgentS</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #121017;
        --shell-border: rgba(216, 180, 254, 0.1);
        --grid-line: rgba(216, 180, 254, 0.05);
        --grid-line-vertical: rgba(216, 180, 254, 0.04);
        --shell-gradient-from: #121017;
        --shell-gradient-to: #17121f;
        --mark-border: rgba(216, 180, 254, 0.16);
        --mark-bg-from: rgba(168, 85, 247, 0.14);
        --mark-bg-to: rgba(24, 20, 32, 0.72);
        --mark-shadow: rgba(0, 0, 0, 0.34);
        --bar-bg: rgba(216, 180, 254, 0.13);
        --line: #30283d;
        --text: #f7f3fb;
        --muted: #b6adbf;
        --accent: #a855f7;
        --accent-2: #d8b4fe;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f5f8;
          --shell-border: rgba(76, 29, 149, 0.12);
          --grid-line: rgba(76, 29, 149, 0.065);
          --grid-line-vertical: rgba(76, 29, 149, 0.05);
          --shell-gradient-from: #fbfaff;
          --shell-gradient-to: #f1eef7;
          --mark-border: rgba(76, 29, 149, 0.16);
          --mark-bg-from: rgba(255, 255, 255, 0.94);
          --mark-bg-to: rgba(236, 231, 248, 0.72);
          --mark-shadow: rgba(76, 29, 149, 0.14);
          --bar-bg: rgba(76, 29, 149, 0.12);
          --line: #ded8e8;
          --text: #24212a;
          --muted: #706b78;
          --accent: #4c1d95;
          --accent-2: #7c3aed;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        color: var(--text);
        -webkit-app-region: drag;
      }

      .shell {
        position: relative;
        display: grid;
        width: 100%;
        height: 100%;
        padding: 34px 38px 30px;
        border: 1px solid var(--shell-border);
        background:
          linear-gradient(var(--grid-line) 1px, transparent 1px) 0 0 / 42px 42px,
          linear-gradient(90deg, var(--grid-line-vertical) 1px, transparent 1px) 0 0 / 42px 42px,
          linear-gradient(145deg, var(--shell-gradient-from) 0%, var(--shell-gradient-to) 100%);
      }

      .mark {
        display: grid;
        width: 62px;
        height: 62px;
        place-items: center;
        border: 1px solid var(--mark-border);
        border-radius: 8px;
        background: linear-gradient(145deg, var(--mark-bg-from), var(--mark-bg-to));
        box-shadow: 0 18px 50px var(--mark-shadow);
      }

      .mark::before {
        width: 30px;
        height: 30px;
        border: 3px solid var(--accent);
        border-top-color: var(--accent-2);
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
        content: "";
      }

      .content {
        align-self: end;
      }

      .name {
        margin: 0 0 10px;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status {
        min-height: 24px;
        margin: 0 0 26px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .bar {
        position: relative;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--bar-bg);
      }

      .bar::before {
        position: absolute;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        animation: load 1.55s ease-in-out infinite;
        content: "";
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes load {
        0% {
          transform: translateX(-110%);
        }

        55% {
          transform: translateX(110%);
        }

        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-live="polite">
      <div class="mark" aria-hidden="true"></div>
      <section class="content">
        <h1 class="name">InternAgentS</h1>
        <p class="status" id="status">Starting InternAgentS...</p>
        <div class="bar" aria-hidden="true"></div>
      </section>
    </main>
    <script>
      const statusElement = document.getElementById("status");

      window.setSplashStatus = (message) => {
        if (typeof message === "string" && message.trim()) {
          statusElement.textContent = message;
        }
      };
    </script>
  </body>
</html>
