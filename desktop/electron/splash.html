<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InternAgents</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #10131a;
        --line: #27303d;
        --text: #f3f6fb;
        --muted: #9ba8b8;
        --accent: #38d0a7;
        --accent-2: #6bb8ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        color: var(--text);
        -webkit-app-region: drag;
      }

      .shell {
        position: relative;
        display: grid;
        width: 100%;
        height: 100%;
        padding: 34px 38px 30px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px) 0 0 / 42px 42px,
          linear-gradient(90deg, rgba(255, 255, 255, 0.028) 1px, transparent 1px) 0 0 / 42px 42px,
          linear-gradient(145deg, #111720 0%, #15120f 100%);
      }

      .mark {
        display: grid;
        width: 62px;
        height: 62px;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
      }

      .mark::before {
        width: 30px;
        height: 30px;
        border: 3px solid var(--accent);
        border-top-color: var(--accent-2);
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
        content: "";
      }

      .content {
        align-self: end;
      }

      .name {
        margin: 0 0 10px;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status {
        min-height: 24px;
        margin: 0 0 26px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .bar {
        position: relative;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.09);
      }

      .bar::before {
        position: absolute;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        animation: load 1.55s ease-in-out infinite;
        content: "";
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes load {
        0% {
          transform: translateX(-110%);
        }

        55% {
          transform: translateX(110%);
        }

        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-live="polite">
      <div class="mark" aria-hidden="true"></div>
      <section class="content">
        <h1 class="name">InternAgents</h1>
        <p class="status" id="status">Starting InternAgents...</p>
        <div class="bar" aria-hidden="true"></div>
      </section>
    </main>
    <script>
      const statusElement = document.getElementById("status");

      window.setSplashStatus = (message) => {
        if (typeof message === "string" && message.trim()) {
          statusElement.textContent = message;
        }
      };
    </script>
  </body>
</html>
